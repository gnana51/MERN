<html>
    <head>
    <title>Rock_paper_scissors</title>
    </head>
    <body>
        <h1>ROCK   PAPER  SCISSORS</h1><BR>
            <button onclick="play('rock')">rock</button><br><br>
            <button onclick="play('paper')">paper</button><br><br>
            <button onclick="play('scissors')">scissors</button><br><br>
            <h3 id="result"></h3>
            <h3 id="score"></h3>
            <script>
                let userscore=0;
                let computerscore=0;
                function play(userchoice){
                    let choice=['rock','paper','scissors'];
                    let computer=choice[Math.floor(Math.random()*3)]
                    let result="";
                    if(computer==userchoice)
                {
                    result="draw";
                }
                else if((userchoice==="rock" && computer==="scissors") || (userchoice==="paper" && computer==="rock") ||userchoice==="scissors" && computer==="paper")
                {
                    result="User wins";
                    userscore++;
                }
                else
                {
                    result="Computer wins";
                    computerscore++;
                }
                 document.getElementById("result").innerHTML ="Computer chose: " + computer + "<br>" + result;
                " <br><br>"

    document.getElementById("score").innerHTML ="User: " + userscore + " | Computer: " + computerscore;
}
    

                
            </script>
    </body>
</html>
